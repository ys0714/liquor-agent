name: 🐛 Bug 报告
description: 报告一个 bug 或问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告问题！请填写以下信息以帮助我们快速定位和解决问题。

  - type: dropdown
    id: module
    attributes:
      label: 实操模块
      description: 您在实操哪个模块时遇到的问题？
      options:
        - 📚 模块一：LangChain 基础学习（AI_LLM_RAG_Agent_Dev）
        - 🔍 模块二：RAG 实战项目（rag-clothing-customer-service）
        - 🤖 模块三：Agent 实战项目（zhisaotong_agent）
        - 🔀 跨模块问题（涉及多个模块）
        - ❓ 不确定 / 其他
    validations:
      required: true

  - type: dropdown
    id: bug_type
    attributes:
      label: 问题类型
      description: 先选一个最符合的类型，如果都不符合再在下面补充说明
      options:
        - ❌ 报错 / 崩溃（抛异常、报错信息）
        - ⚠️ 结果不对（回答或行为明显不符合预期）
        - 🐌 性能问题（很慢 / 卡顿）
        - 🔁 对话逻辑问题（重复回答 / 跳话题）
        - ⚙️ 配置相关问题（环境 / 配置文件）
        - 🧱 界面 / 交互问题
        - 🧪 本地开发 / 调试问题
        - 其他
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 发生频率
      description: 这个问题出现的频率
      options:
        - 每次都会出现
        - 经常出现（> 50% 的概率）
        - 偶尔出现（< 50% 的概率）
        - 只出现过一次
        - 暂不清楚
    validations:
      required: true

  - type: checkboxes
    id: scenario
    attributes:
      label: 出问题时你在做什么？
      description: 勾选一个或多个最接近的场景
      options:
        - label: 在本地运行项目（开发 / 调试）
        - label: 使用 Web / 前端页面进行对话
        - label: 调用 RAG / 检索相关功能
        - label: 构建或更新向量库 / 知识库
        - label: 修改配置后运行
        - label: 其它场景

  - type: dropdown
    id: component
    attributes:
      label: 相关组件
      description: 这个问题涉及哪个组件？
      options:
        - RAG 服务
        - 智能体 (Agent)
        - 向量库
        - 模型调用
        - 前端界面
        - 配置文件
        - 其他
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      description: 这个问题的严重程度如何？
      options:
        - 🔴 严重 - 系统无法使用
        - 🟠 高 - 主要功能受影响
        - 🟡 中 - 部分功能受影响
        - 🟢 低 - 轻微问题，不影响使用
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 运行环境（大致）
      description: 先选一个大致环境，如果都不符合再在下面补充说明
      options:
        - Linux + Python 3.10+
        - macOS + Python 3.10+
        - Windows + Python 3.10+
        - Docker / 容器环境
        - 云服务器环境
        - 其他 / 不确定

  - type: textarea
    id: additional
    attributes:
      label: 补充说明（可选）
      description: 只有当上面的选项都不太符合，或你有额外信息（报错信息 / 截图 / 特殊场景）时再简单写几句
      placeholder: 例如：实际报错信息、和预期不符的地方、特殊运行方式等
