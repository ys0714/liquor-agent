name: ✨ 功能请求
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议！请详细描述您希望添加的功能或改进。

  - type: dropdown
    id: module
    attributes:
      label: 相关模块
      description: 这个功能请求主要针对哪个模块？
      options:
        - 📚 模块一：LangChain 基础学习（AI_LLM_RAG_Agent_Dev）
        - 🔍 模块二：RAG 实战项目（rag-clothing-customer-service）
        - 🤖 模块三：Agent 实战项目（zhisaotong_agent）
        - 🔀 跨模块功能（涉及多个模块）
        - ❓ 不确定 / 其他
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: 功能描述
      description: 请详细描述您希望添加的功能
      placeholder: 例如：我希望系统能够支持多轮对话上下文记忆...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 这个功能在什么场景下会用到？请描述具体的使用场景
      placeholder: |
        例如：
        - 用户在咨询产品时，需要记住之前的对话内容
        - 用户希望系统能够推荐相关的产品...
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: 预期收益
      description: 这个功能会带来什么好处？
      placeholder: 这个功能可以提升用户体验，减少重复提问...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 相关组件
      description: 这个功能主要涉及哪个组件？
      options:
        - RAG 服务
        - 智能体 (Agent)
        - 向量库
        - 模型调用
        - 前端界面
        - 用户数据分析
        - 报告生成
        - 其他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 您认为这个功能的优先级如何？
      options:
        - 🔴 高 - 核心功能，急需
        - 🟠 中 - 重要功能，希望尽快
        - 🟡 低 - 锦上添花，有时间再做
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您是否考虑过其他替代方案？如果有，请描述
      placeholder: 也可以考虑通过...来实现类似效果

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 任何其他相关信息（截图、参考链接等）
      placeholder: 相关截图、参考链接等...
